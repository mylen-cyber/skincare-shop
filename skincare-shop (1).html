<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K-Beauty Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #FAF7F2; --blush: #E8C4B8; --rose: #C27B6A;
      --dark: #2A1F1A; --mid: #7A5C52; --soft: #F2EBE4; --white: #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 2rem 4rem; border-bottom: 1px solid var(--blush); background: var(--white); position: sticky; top: 0; z-index: 10; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: .04em; }
    .logo span { color: var(--rose); font-style: italic; }
    .tagline { font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; color: var(--mid); }

    .hero { text-align: center; padding: 5rem 2rem 3.5rem; background: linear-gradient(160deg, var(--soft) 0%, var(--cream) 60%); }
    .hero-label { font-size: .7rem; letter-spacing: .22em; text-transform: uppercase; color: var(--rose); margin-bottom: 1rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 4rem); line-height: 1.15; max-width: 560px; margin: 0 auto 1rem; }
    .hero h1 em { color: var(--rose); }
    .hero p { font-size: .95rem; color: var(--mid); font-weight: 300; }

    .shop { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; }

    .card-wrapper { position: relative; }
    .card { background: var(--white); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: transform .3s ease, box-shadow .3s ease; cursor: pointer; opacity: 0; animation: fadeUp .5s ease forwards; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(194,123,106,.18); }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.10s} .card:nth-child(3){animation-delay:.15s} .card:nth-child(4){animation-delay:.20s}
    .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.30s} .card:nth-child(7){animation-delay:.35s} .card:nth-child(8){animation-delay:.40s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--soft); display: block; }
    .card-img-placeholder { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: linear-gradient(135deg, var(--soft) 0%, var(--blush) 100%); }
    .card-body { padding: 1.25rem 1.4rem 1.6rem; flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .card-brand { font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--rose); font-weight: 500; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; line-height: 1.35; flex: 1; }
    .card-desc { font-size: .78rem; color: var(--mid); font-weight: 300; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: .9rem; }
    .card-price { font-size: 1.1rem; font-weight: 500; }
    .btn-add { background: var(--dark); color: var(--white); border: none; border-radius: 8px; padding: .45rem 1rem; font-family: 'DM Sans', sans-serif; font-size: .75rem; letter-spacing: .06em; cursor: pointer; transition: background .2s; }
    .btn-add:hover { background: var(--rose); }
    .badge { position: absolute; top: 12px; left: 12px; background: var(--rose); color: var(--white); font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; padding: .28rem .65rem; border-radius: 20px; font-weight: 500; }
    footer { text-align: center; padding: 2rem; border-top: 1px solid var(--blush); font-size: .75rem; color: var(--mid); letter-spacing: .08em; }
  </style>
</head>
<body>

<header>
  <div class="logo">K<span>beauty</span></div>
  <div class="tagline">Korean Skincare Essentials</div>
</header>

<section class="hero">
  <p class="hero-label">Curated from Seoul</p>
  <h1>Skin that <em>glows</em>,<br>rituals that last.</h1>
  <p>Authentic Korean skincare — directly to your door.</p>
</section>

<main class="shop">
  <div class="grid" id="productGrid"></div>
</main>

<footer>© 2026 · All products sourced directly from Korea</footer>

<script>
  // Published Google Sheet → CSV (same URL, loaded via <script> tag to bypass CORS)
  const SHEET_ID = '2PACX-1vSpnMP7x10zMSaEzRV3uygj4sM0Q1DADEC2eMUYmi1g6rbeLtIYSnPpYyRu3ST3iwQN0H7tDAosZRg5';
  const CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if      (ch === '"')  { inQuotes = true; }
        else if (ch === ',')  { row.push(field.trim()); field = ''; }
        else if (ch === '\r') { /* skip */ }
        else if (ch === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
        else { field += ch; }
      }
    }
    if (field || row.length) { row.push(field.trim()); rows.push(row); }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.toLowerCase().trim());
    return rows.slice(1)
      .filter(r => r.some(c => c))
      .map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i] ?? ''; });
        return obj;
      });
  }

  function renderCard(p, index) {
    const grid = document.getElementById('productGrid');

    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${0.05 + index * 0.05}s`;

    const imgSrc   = p.image || p.img || '';
    const name     = p.name  || '';
    const brand    = p.brand || '';
    const desc     = p.desc  || p.description || '';
    const price    = p.price || '';
    const badgeVal = p.badge || '';

    card.innerHTML = `
      ${imgSrc
        ? `<img class="card-img" src="${imgSrc}" alt="${name}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="card-img-placeholder" style="display:${imgSrc ? 'none' : 'flex'}">🌿</div>
      <div class="card-body">
        <span class="card-brand">${brand}</span>
        <div class="card-name">${name}</div>
        <div class="card-desc">${desc}</div>
        <div class="card-footer">
          <span class="card-price">${price}</span>
          <button class="btn-add">Add to cart</button>
        </div>
      </div>
    `;

    wrapper.appendChild(card);

    if (badgeVal) {
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = badgeVal;
      wrapper.appendChild(badge);
    }

    grid.appendChild(wrapper);
  }

  function showError(msg) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = `<p style="color:var(--rose);font-size:.9rem;grid-column:1/-1;padding:2rem 0;">${msg}</p>`;
  }

  async function tryFetch(url, isProxy) {
    const res = await fetch(url, { mode: isProxy ? 'cors' : 'cors', redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (isProxy) {
      const json = await res.json();
      return json.contents;
    }
    return await res.text();
  }

  async function loadProducts() {
    const proxy1 = `https://corsproxy.io/?${encodeURIComponent(CSV_URL)}`;
    const proxy2 = `https://api.allorigins.win/get?url=${encodeURIComponent(CSV_URL)}`;

    const attempts = [
      () => tryFetch(CSV_URL, false),
      () => tryFetch(proxy1, false),
      () => tryFetch(proxy2, true),
    ];

    let text = null;
    for (const attempt of attempts) {
      try { text = await attempt(); if (text) break; } catch(e) { console.warn('Attempt failed:', e); }
    }

    if (!text) {
      showError('Could not load products — open this file from a web server (e.g. drag it onto <a href="https://tiiny.host" target="_blank" style="color:var(--rose)">tiiny.host</a>).');
      return;
    }

    const items = parseCSV(text);
    if (!items.length) { showError('No products found in the sheet.'); return; }
    items.forEach((p, i) => renderCard(p, i));
  }

  loadProducts();
</script>
</body>
</html>
